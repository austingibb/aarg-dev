# nginx config for aarg.dev (static React/Vite SPA, React Router v7).
# Public TLS is terminated by Cloudflare; the tunnel forwards plain HTTP to :4173 here.
# Run via:
#   nginx.exe -p C:/nginx -c C:/Users/austi/Desktop/aarg-dev/nginx.conf -g "daemon off;"
# Uses the shared C:\nginx binary/prefix for temp dirs, a unique pid, and logs in this repo.

# Run in the foreground so the NSSM service wrapper can supervise the process.
daemon off;

worker_processes  1;

# Unique pid so this instance never collides with the yt-2-eink nginx using the same prefix.
pid  C:/nginx/logs/nginx-aarg.pid;

events {
    worker_connections  1024;
}

http {
    include       C:/nginx/conf/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    access_log  C:/Users/austi/Desktop/aarg-dev/logs/nginx.access.log;
    error_log   C:/Users/austi/Desktop/aarg-dev/logs/nginx.error.log;

    server {
        listen       4173;
        server_name  aarg.dev localhost;

        root   "C:/Users/austi/Desktop/aarg-dev/dist";
        index  index.html;

        # Cache fingerprinted build assets aggressively; they get new hashes on rebuild.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # SPA fallback: serve index.html for all client-side (React Router) routes.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
